<!DOCTYPE html>
<html lang="es-CL">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Material académico disponible para visualizar y descargar en Atlántida.">
  <title>Atlántida | Papeo</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="site-header" data-active="papeo"></div>
  <main>
    <section class="hero">
      <div class="container">
        <h1>Papeo</h1>
        <p>Material académico disponible para visualizar y descargar.</p>
      </div>
    </section>
    <section class="section">
      <div class="container">
        <h2>Documentos disponibles</h2>
        <input id="buscador" type="search" placeholder="Buscar documentos...">
        <div class="grid">
          <article class="card document-card">
            <img class="thumb" src="images/iconos/pdf.png" alt="Miniatura PDF" loading="lazy">
            <h3>Documento de ejemplo</h3>
            <p>Categoría: Papeo</p>
            <p>Descripción breve del documento disponible.</p>
            <a class="btn" href="pdf/papeo/documento-ejemplo.pdf" target="_blank" rel="noopener">Ver</a>
            <a class="btn" href="pdf/papeo/documento-ejemplo.pdf" download>Descargar</a>
          </article>
        </div>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <button class="top-btn" aria-label="Volver arriba">↑</button>
  <script src="js/components.js"></script>
  <script src="js/scripts.js"></script>
</body>
</html>
