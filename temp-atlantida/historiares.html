<!DOCTYPE html>
<html lang="es-CL">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Resúmenes digitales de historia disponibles en Atlántida.">
  <title>Atlántida | Resúmenes de Historia</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="site-header" data-active="historiares"></div>
  <main>
    <section class="hero">
      <div class="container">
        <h1>Resúmenes de Historia</h1>
        <p>Resúmenes digitales de historia para estudiar contenidos clave.</p>
      </div>
    </section>
    <section class="section">
      <div class="container">
        <h2>Resúmenes disponibles</h2>
        <input id="buscador" type="search" placeholder="Buscar resúmenes...">
        <div class="grid">
          <article class="card document-card">
            <img class="thumb" src="images/iconos/pdf.png" alt="Miniatura PDF" loading="lazy">
            <h3>Resumen de historia de ejemplo</h3>
            <p>Categoría: Historia</p>
            <p>Resumen digital disponible para visualizar o descargar.</p>
            <a class="btn" href="pdf/resumenes/historia/resumen-historia-ejemplo.pdf" target="_blank" rel="noopener">Ver</a>
            <a class="btn" href="pdf/resumenes/historia/resumen-historia-ejemplo.pdf" download>Descargar</a>
          </article>
        </div>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <button class="top-btn" aria-label="Volver arriba">↑</button>
  <script src="js/components.js"></script>
  <script src="js/scripts.js"></script>
</body>
</html>
