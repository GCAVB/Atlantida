<!DOCTYPE html>
<html lang="es-CL">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Libros digitales de ciencias disponibles en Atlántida.">
  <title>Atlántida | Libros de Ciencias</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="site-header" data-active="cienciaslib"></div>
  <main>
    <section class="hero">
      <div class="container">
        <h1>Libros de Ciencias</h1>
        <p>Libros digitales de ciencias disponibles para consulta.</p>
      </div>
    </section>
    <section class="section">
      <div class="container">
        <h2>Libros disponibles</h2>
        <input id="buscador" type="search" placeholder="Buscar libros...">
        <div class="grid">
          <article class="card document-card">
            <img class="thumb" src="images/iconos/pdf.png" alt="Miniatura PDF" loading="lazy">
            <h3>Libro de ciencias de ejemplo</h3>
            <p>Categoría: Ciencias</p>
            <p>Libro digital disponible para visualizar o descargar.</p>
            <a class="btn" href="pdf/libros/ciencias/libro-ciencias-ejemplo.pdf" target="_blank" rel="noopener">Ver</a>
            <a class="btn" href="pdf/libros/ciencias/libro-ciencias-ejemplo.pdf" download>Descargar</a>
          </article>
        </div>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <button class="top-btn" aria-label="Volver arriba">↑</button>
  <script src="js/components.js"></script>
  <script src="js/scripts.js"></script>
</body>
</html>
