<!DOCTYPE html>
<html lang="es-CL">
<head>
  <meta name="description" content="Contacta a Atlántida para consultas sobre impresiones, fotocopias, digitalización, anillado y servicios académicos en Estación Central.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://atlantida360.cl/atlantida/contactanos.html">
  <meta property="og:title" content="Contáctanos | Atlántida">
  <meta property="og:description" content="Escríbenos para consultas sobre impresiones, fotocopias, digitalización y anillado en Atlántida.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://atlantida360.cl/atlantida/contactanos.html">
  <title>Contacto Atlántida | Impresiones y fotocopias en Estación Central</title>
  <link rel="stylesheet" href="css/styles.css">
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"ContactPage","@id":"https://atlantida360.cl/atlantida/contactanos.html#contact","name":"Contacto Atlántida","url":"https://atlantida360.cl/atlantida/contactanos.html","about":{"@id":"https://atlantida360.cl/#localbusiness"}}</script>
</head>
<body>
  <div id="site-header" data-active="contactanos"></div>
  <main>
    <section class="hero">
      <div class="container">
        <h1>Contáctanos</h1>
        <p>Escríbenos si tienes dudas, consultas o solicitudes especiales.</p>
      </div>
    </section>
    <section class="section">
      <div class="container">
        <h2>Formulario de contacto</h2>

        <form class="form" data-form="contacto" netlify name="contacto" method="POST" data-netlify="true" netlify-honeypot="bot-field">
          <input type="hidden" name="form-name" value="contacto">

          <p style="display:none"><label>No completar: <input name="bot-field"></label> </p>
          <label> Nombre <input type="text" name="nombre" required></label>
          <label> Correo <input type="email" name="correo" required></label>
          <label> Mensaje <textarea name="mensaje" rows="6" minlength="40" required></textarea></label>
          <div class="message" role="status" aria-live="polite"></div>
          <button class="btn" type="submit">Enviar mensaje</button>
          <button class="btn secondary" type="button" data-clear>Limpiar</button>
        </form>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <button class="top-btn" aria-label="Volver arriba">↑</button>
  <script src="js/components.js"></script>
  <script src="js/scripts.js"></script>
</body>
</html>
