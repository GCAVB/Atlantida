<!DOCTYPE html>
<html lang="es-CL">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Formulario de contacto para dudas, consultas o solicitudes especiales en Atlántida.">
  <title>Atlántida | Contáctanos</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="site-header" data-active="contactanos"></div>
  <main>
    <section class="hero">
      <div class="container">
        <h1>Contáctanos</h1>
        <p>Escríbenos si tienes dudas, consultas o solicitudes especiales.</p>
      </div>
    </section>
    <section class="section">
      <div class="container">
        <h2>Formulario de contacto</h2>

        <form class="form" data-form="contacto" netlify name="contacto" method="POST" data-netlify="true" netlify-honeypot="bot-field" data-netlify-recaptcha="true">
          <input type="hidden" name="form-name" value="contacto">

          <p style="display:none"><label>No completar: <input name="bot-field"></label> </p>
          <label> Nombre <input type="text" name="nombre" required></label>
          <label> Correo <input type="email" name="correo" required></label>
          <label> Mensaje <textarea name="mensaje" rows="6" minlength="40" required></textarea></label>
          <div class="message" role="status" aria-live="polite"></div>
          <button class="btn" type="submit">Enviar mensaje</button>
          <button class="btn secondary" type="button" data-clear>Limpiar</button>
        </form>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <button class="top-btn" aria-label="Volver arriba">↑</button>
  <script src="js/components.js"></script>
  <script src="js/scripts.js"></script>
</body>
</html>
