<!DOCTYPE html>
<html lang="es-CL">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Calcula online el precio de fotocopias, impresiones blanco y negro, digitalización y anillado en Atlántida, Estación Central.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://atlantida360.cl/atlantida/cotizaciones.html">
  <meta property="og:title" content="Calculadora de cotizaciones | Atlántida">
  <meta property="og:description" content="Cotiza online impresiones, fotocopias, digitalización y anillado con la calculadora de Atlántida.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://atlantida360.cl/atlantida/cotizaciones.html">
  <title>Cotizador online de impresiones y fotocopias | Atlántida</title>
  <link rel="stylesheet" href="css/styles.css">
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"WebPage","@id":"https://atlantida360.cl/atlantida/cotizaciones.html#webpage","name":"Cotizador online de impresiones y fotocopias","url":"https://atlantida360.cl/atlantida/cotizaciones.html","description":"Calculadora online para estimar precios de impresiones, fotocopias, digitalización y anillado en Atlántida.","isPartOf":{"@id":"https://atlantida360.cl/#website"},"about":{"@id":"https://atlantida360.cl/#localbusiness"}}</script>
</head>
<body>
  <div id="site-header" data-active="cotizaciones"></div>
  <main>
    <section class="hero">
      <div class="container">
        <h1>Cotizaciones</h1>
        <p>Calcula el valor estimado de fotocopias, impresiones o digitalización según la cantidad de páginas.</p>
      </div>
    </section>
    <section class="section">
      <div class="container">
        <h2>Calculadora de cotización</h2>
        <p>Selecciona el servicio e ingresa la cantidad de páginas para obtener un precio referencial.</p>
        <div class="form calculator" aria-label="Calculadora de cotización">
          <label>Servicio
            <select id="tipo-servicio" required>
              <option value="">Selecciona una opción</option>
              <option value="fotocopiabn">Fotocopias Blanco y negro</option>
              <option value="impresionbn">Impresiones Blanco y negro </option>
              <option value="digitalizacionnor">Digitalización normal</option>
              <option value="digitalizacionesp">Digitalización personalizada</option>
            </select>
          </label>
          <label id="label-lado-hoja" hidden>Lado de la hoja<select id="lado-hoja"><option value="unlado">Un lado de la hoja</option><option value="amboslados">Ambos lados de la hoja</option></select></label>
          <label id="label-anillado" hidden>Anillado<select id="tipo-anillado"><option value="sin" selected>Sin anillado</option><option value="con">Con anillado</option></select></label>
          <label>Cantidad de páginas<input id="cantidad-paginas" type="number" min="1" step="1" inputmode="numeric" pattern="[0-9]*" placeholder="Ej: 120" required></label>
          <button class="btn" type="button" id="calcular-cotizacion">Calcular</button>
          <div class="message" id="resultado-cotizacion" role="status" aria-live="polite"></div>
        </div>

      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <button class="top-btn" aria-label="Volver arriba">↑</button>
  <script src="js/components.js"></script>
  <script src="js/scripts.js"></script>
</body>
</html>
